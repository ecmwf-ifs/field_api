name: build-hpc

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request: ~
  workflow_dispatch: ~
  pull_request_target:
    types: [labeled]

jobs:
  ci-hpc:
    name: ci-hpc - ${{ matrix.name }}
    if: ${{ (!github.event.pull_request.head.repo.fork) && (github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci') }}

    strategy:
      fail-fast: false
      matrix:
        build_type: [RelWithDebInfo]
        site: [ac-batch]
        name: 
          - "ac-cpu intel"
          - "ac-cpu gnu"
          - "ac-gpu nvhpc OpenACC + CUDA"
          - "ac-gpu nvhpc OMP offload"
          - "ac-gpu nvhpc OpenACC"
          - "ac-gpu nvhpc OMP offload + CUDA"
    
        include:

          # ------------------
          # CPU builds
          # ------------------
          - name: "ac-cpu intel"
            compiler: intel-classic
            cuda: false
            openmp: false
            # Define CPU modules once, reuse via *modules_intel if needed elsewhere
            modules: &modules_intel
              - cmake/4.0.2
              - ninja/1.12.1
              - ecbuild/3.12.0
              - prgenv/intel
              - intel/2023.2.0
              - hpcx-openmpi/2.9.0
              - hdf5/1.14.3
              - python3
            # Define CPU sbatch once, reuse via *sbatch_cpu
            sbatch_options: &sbatch_cpu |
              #SBATCH --time=00:20:00
              #SBATCH --nodes=1
              #SBATCH --ntasks=2
              #SBATCH --cpus-per-task=32
              #SBATCH --hint=nomultithread
              #SBATCH --qos=np

          - name: "ac-cpu gnu"
            compiler: gnu-14
            cuda: false
            openmp: false
            modules: &modules_gnu
              - cmake/4.0.2
              - ninja/1.12.1
              - ecbuild/3.12.0
              - prgenv/gnu
              - gcc/14.2.0
              - openmpi/4.1.1.1
              - hdf5/1.14.3
              - python3
            sbatch_options: *sbatch_cpu

          # ------------------
          # GPU builds (nvhpc)
          # ------------------
          - name: "ac-gpu nvhpc OpenACC + CUDA"
            compiler: nvhpc
            cuda: true
            openmp: false
            # Define NVHPC modules once, reuse in the next GPU entries
            modules: &modules_nvhpc
              - cmake/4.0.2
              - ninja/1.12.1
              - ecbuild/3.12.0
              - prgenv/nvidia
              - nvidia/24.5
              - hpcx-openmpi/2.19.0-cuda
              - hdf5/1.14.3
              - python3
            # Define GPU sbatch once, reuse in the next GPU entries
            sbatch_options: &sbatch_gpu |
              #SBATCH --time=00:20:00
              #SBATCH --nodes=1
              #SBATCH --ntasks=2
              #SBATCH --cpus-per-task=32
              #SBATCH --gpus-per-task=1
              #SBATCH --mem=100G
              #SBATCH --qos=dg
            cmake_toolchain: &nvhpc_toolchain -DCMAKE_TOOLCHAIN_FILE=arch/ecmwf/hpc2020/nvhpc/24.5/toolchain.cmake

          - name: "ac-gpu nvhpc OMP offload"
            compiler: nvhpc
            cuda: false
            openmp: true
            modules: *modules_nvhpc
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain 

          - name: "ac-gpu nvhpc OMP offload + CUDA"
            compiler: nvhpc
            cuda: true
            openmp: true
            modules: *modules_nvhpc
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain

          - name: "ac-gpu nvhpc OpenACC"
            compiler: nvhpc
            cuda: false
            openmp: false
            modules: *modules_nvhpc
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain

    runs-on: [self-hosted, linux, hpc]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: ecmwf-actions/reusable-workflows/ci-hpc-generic@v2
        with:
          site: ${{ matrix.site }}
          troika_user: ${{ secrets.HPC_CI_SSH_USER }}
          sbatch_options: ${{ matrix.sbatch_options }}
          template_data: |
            cmake_options:
              - -DENABLE_OMP_OFFLOAD=${{ matrix.openmp }}
              - -DENABLE_CUDA=${{ matrix.cuda }}
              - -DENABLE_IO_SERIAL=ON
              - -DENABLE_SINGLE_PRECISION=ON
              - -DENABLE_DOUBLE_PRECISION=ON
              - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}${{ matrix.cmake_toolchain || '' }}
            dependencies:
              ecmwf/fckit:
                version: 0.14.0
                cmake_options:
                  - -DENABLE_TESTS=OFF
                  - -DENABLE_FCKIT_VENV=ON
                  - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
              ecmwf-ifs/fiat:
                version: 1.6.1
                cmake_options:
                  - -DENABLE_TESTS=OFF
                  - -DENABLE_SINGLE_PRECISION=ON
                  - -DENABLE_DOUBLE_PRECISION=ON
                  - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
          template: |
            {% for module in "${{ join(matrix.modules, ',') }}".split(',') %}
              module load {{ module }}
            {% endfor %}
            BASEDIR=$PWD
            {% for name, options in dependencies.items() %}
              mkdir -p {{ name }}
              pushd {{ name }}
              git init
              git remote add origin ${{ github.server_url }}/{{ name }}
              git fetch origin {{ options['version'] }}
              git reset --hard FETCH_HEAD
              cmake -G Ninja -S . -B build \
                {% for name in dependencies %}
                  {% set org, proj = name.split('/') %}
                  -D{{proj}}_ROOT=$BASEDIR/{{name}}/installation \
                {% endfor %}
                {{ options['cmake_options']|join(' ') }}

              cmake --build build
              cmake --install build --prefix installation
              popd
            {% endfor %}
            REPO=${{ github.event.pull_request.head.repo.full_name || github.repository }}
            SHA=${{ github.event.pull_request.head.sha || github.sha }}
            mkdir -p $REPO
            pushd $REPO
            git init
            git remote add origin ${{ github.server_url }}/$REPO
            git fetch origin $SHA
            git reset --hard FETCH_HEAD
            popd
            cmake -G "Unix Makefiles" -S $REPO -B build \
              {% for name in dependencies %}
                {% set org, proj = name.split('/') %}
                -D{{proj}}_ROOT=$BASEDIR/{{name}}/installation \
              {% endfor %}
              {{ cmake_options|join(' ') }}
            cmake --build build
            ulimit -S -s unlimited
            ctest --test-dir build --output-on-failure
