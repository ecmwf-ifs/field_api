name: build-hpc

# Controls when the action will run
on:
  push:
    branches:
    - main
    tags-ignore:
    - '**'

  # Trigger the workflow on all pull requests
  pull_request: ~

  # Allow workflow to be dispatched on demand
  workflow_dispatch: ~

  # Trigger after public PR approved for CI
  pull_request_target:
    types: [labeled]

jobs:
  ci-hpc:
    name: ci-hpc
    if: ${{ !github.event.pull_request.head.repo.fork && github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci' }}

    strategy:
      fail-fast: false    # false: try to complete all jobs
      matrix:
        build_type: [RelWithDebInfo]
        name: 
          - "ac-cpu intel"
          - "ac-cpu gnu"
          - "lumi-c cce"
          - "ac-gpu nvhpc OpenACC + CUDA"
          - "ac-gpu nvhpc OMP offload"
          - "ac-gpu nvhpc OpenACC"
          - "ac-gpu nvhpc OMP offload + CUDA"
          - "lumi-g rocm-afar OMP offload"
          - "lumi-g rocm-afar OMP offload + HIPFORT"

        include:

          # ------------------
          # CPU builds
          # ------------------
          - name: "ac-cpu intel"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: intel-classic
            cmake_options: -DENABLE_OMP_OFFLOAD=OFF -DENABLE_CUDA=OFF -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            # Define CPU sbatch once, reuse via *sbatch_cpu
            sbatch_options: &sbatch_cpu |
              #SBATCH --time=00:20:00
              #SBATCH --nodes=1
              #SBATCH --ntasks=2
              #SBATCH --cpus-per-task=32
              #SBATCH --hint=nomultithread
              #SBATCH --qos=np
            envfile: arch/ecmwf/hpc2020/intel/2021.4.0/env.sh

          - name: "ac-cpu gnu"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: gnu-14
            cmake_options: -DENABLE_OMP_OFFLOAD=OFF -DENABLE_CUDA=OFF -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            sbatch_options: *sbatch_cpu
            envfile: arch/ecmwf/hpc2020/gnu/14.2.0/env.sh

          - name: "lumi-c cce"
            site: lumi
            troika_user_secret: LUMI_CI_SSH_USER
            account_secret: LUMI_CI_PROJECT
            compiler: cce
            sbatch_options: |
              #SBATCH --time=00:30:00
              #SBATCH --nodes=1
              #SBATCH --ntasks=1
              #SBATCH --ntasks-per-node=1
              #SBATCH --cpus-per-task=8
              #SBATCH --partition=dev-g
              #SBATCH --account={0}
            output_dir: /scratch/{0}/github-actions/field_api/lumi-c/${{ github.run_id }}/${{ github.run_attempt }}
            workdir: /scratch/{0}/github-actions/field_api/lumi-c/${{ github.run_id }}/${{ github.run_attempt }}
            cmake_toolchain: -DCMAKE_TOOLCHAIN_FILE=arch/eurohpc/lumi/cray-cpu/20.0.0/toolchain.cmake
            envfile: arch/eurohpc/lumi/cray-cpu/20.0.0/env.sh

          # ------------------
          # GPU builds (nvhpc)
          # ------------------
          - name: "ac-gpu nvhpc OpenACC + CUDA"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: nvhpc
            cmake_options: -DENABLE_OMP_OFFLOAD=OFF -DENABLE_CUDA=ON -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            # Define GPU sbatch once, reuse in the next GPU entries
            sbatch_options: &sbatch_gpu |
              #SBATCH --time=00:20:00
              #SBATCH --nodes=1
              #SBATCH --ntasks=2
              #SBATCH --cpus-per-task=32
              #SBATCH --gpus-per-task=1
              #SBATCH --mem=100G
              #SBATCH --qos=dg
            cmake_toolchain: &nvhpc_toolchain -DCMAKE_TOOLCHAIN_FILE=arch/ecmwf/hpc2020/nvhpc/24.5/toolchain.cmake
            envfile: &nvhpc_envfile arch/ecmwf/hpc2020/nvhpc/24.5/env.sh

          - name: "ac-gpu nvhpc OMP offload"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: nvhpc
            cmake_options: -DENABLE_OMP_OFFLOAD=ON -DENABLE_CUDA=OFF -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain 
            envfile: *nvhpc_envfile

          - name: "ac-gpu nvhpc OMP offload + CUDA"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: nvhpc
            cmake_options: -DENABLE_OMP_OFFLOAD=ON -DENABLE_CUDA=ON -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain
            envfile: *nvhpc_envfile

          - name: "ac-gpu nvhpc OpenACC"
            site: ac-batch
            troika_user_secret: HPC_CI_SSH_USER
            compiler: nvhpc
            cmake_options: -DENABLE_OMP_OFFLOAD=OFF -DENABLE_CUDA=OFF -DENABLE_MPI=ON -DENABLE_IO_PARALLEL=ON
            sbatch_options: *sbatch_gpu
            cmake_toolchain: *nvhpc_toolchain
            envfile: *nvhpc_envfile

          # ------------------
          # GPU builds (rocm-afar)
          # ------------------
          - name: "lumi-g rocm-afar OMP offload"
            site: lumi
            troika_user_secret: LUMI_CI_SSH_USER
            account_secret: LUMI_CI_PROJECT
            compiler: rocm-afar
            cmake_options: -DENABLE_OMP_OFFLOAD=ON -DENABLE_DOUBLE_PRECISION=OFF
            sbatch_options: &sbatch_lumi_gpu |
              #SBATCH --time=00:30:00
              #SBATCH --nodes=1
              #SBATCH --ntasks-per-node=1
              #SBATCH --cpus-per-task=7
              #SBATCH --gpus-per-task=1
              #SBATCH --partition=dev-g
              #SBATCH --account={0}
            output_dir: /scratch/{0}/github-actions/field_api/${{ github.run_id }}/${{ github.run_attempt }}
            workdir: /scratch/{0}/github-actions/field_api/${{ github.run_id }}/${{ github.run_attempt }}
            cmake_toolchain: &rocm_afar_toolchain -DCMAKE_TOOLCHAIN_FILE=arch/eurohpc/lumi/rocm-afar/22.2/toolchain.cmake
            envfile: &rocm_afar_envfile arch/eurohpc/lumi/rocm-afar/22.2/env.sh

          - name: "lumi-g rocm-afar OMP offload + HIPFORT"
            site: lumi
            troika_user_secret: LUMI_CI_SSH_USER
            account_secret: LUMI_CI_PROJECT
            compiler: rocm-afar
            cmake_options: -DENABLE_OMP_OFFLOAD=ON -DENABLE_HIPFORT=ON -DENABLE_DOUBLE_PRECISION=OFF
            sbatch_options: *sbatch_lumi_gpu
            output_dir: /scratch/{0}/github-actions/field_api/${{ github.run_id }}/${{ github.run_attempt }}
            workdir: /scratch/{0}/github-actions/field_api/${{ github.run_id }}/${{ github.run_attempt }}
            cmake_toolchain: *rocm_afar_toolchain
            envfile: *rocm_afar_envfile

    runs-on: [self-hosted, linux, hpc]

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: ecmwf-actions/reusable-workflows/ci-hpc-generic@v2
        with:
          site: ${{ matrix.site }}
          troika_user: ${{ secrets[matrix.troika_user_secret] }}
          sbatch_options: ${{ format(matrix.sbatch_options, secrets[matrix.account_secret]) }}
          output_dir: ${{ format(matrix.output_dir, secrets[matrix.account_secret]) || '' }}
          workdir: ${{ format(matrix.workdir, secrets[matrix.account_secret]) || '' }}
          template_data: |
            cmake_options:
              - ${{ matrix.cmake_options }}
              - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}${{ matrix.cmake_toolchain || '' }}
            dependencies:
              ecmwf/ecbuild:
                version: 3.13.1
              ecmwf/fckit:
                version: 0.14.0
                cmake_options:
                  - -DENABLE_TESTS=OFF
                  - -DENABLE_FCKIT_VENV=ON
                  - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
              ecmwf-ifs/fiat:
                version: 1.6.1
                cmake_options:
                  - -DENABLE_TESTS=OFF
                  - -DENABLE_SINGLE_PRECISION=ON
                  - -DENABLE_DOUBLE_PRECISION=ON
                  - -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
          template: |
            REPO=${{ github.event.pull_request.head.repo.full_name || github.repository }}
            SHA=${{ github.event.pull_request.head.sha || github.sha }}
            mkdir -p $REPO
            pushd $REPO
            git init
            git remote add origin ${{ github.server_url }}/$REPO
            git fetch origin $SHA
            git reset --hard FETCH_HEAD
            source ${{ matrix.envfile }}
            popd
            BASEDIR=$PWD
            {% for name, options in dependencies.items() %}
              mkdir -p {{ name }}
              pushd {{ name }}
              git init
              git remote add origin ${{ github.server_url }}/{{ name }}
              git fetch origin {{ options['version'] }}
              git reset --hard FETCH_HEAD
              cmake -G Ninja -S . -B build \
                {% for name in dependencies %}
                  {% set org, proj = name.split('/') %}
                  -D{{proj}}_ROOT=$BASEDIR/{{name}}/installation \
                {% endfor %}
                {{ options['cmake_options']|join(' ') }}

              cmake --build build
              cmake --install build --prefix installation
              popd
            {% endfor %}
            cmake -G "Unix Makefiles" -S $REPO -B build \
              {% for name in dependencies %}
                {% set org, proj = name.split('/') %}
                -D{{proj}}_ROOT=$BASEDIR/{{name}}/installation \
              {% endfor %}
              {{ cmake_options|join(' ') }}
            cmake --build build -- -j 8
            ctest -VV --test-dir build --output-on-failure
